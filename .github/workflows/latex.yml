name: LaTeX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: teatimeguest/setup-tectonic@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build LSN paper
        run: |
          cd paper
          tectonic lsn-paper.tex
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lsn-paper-pdf
          path: paper/lsn-paper.pdf
