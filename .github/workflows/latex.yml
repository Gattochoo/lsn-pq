name: LaTeX

# NOTE (2026-06-13): GitHub Actions usage exhausted until 2026-06-26; CI builds
# fail with "All jobs have failed". Disabled push/PR triggers until then to stop
# failure emails — the paper is built locally with tectonic and the PDF is
# committed, so CI is redundant in the meantime. RESTORE push/pull_request
# triggers after 2026-06-26 (uncomment the two blocks below).
on:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:

jobs:
  build-latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: teatimeguest/setup-tectonic@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build LSN paper
        run: |
          cd paper
          tectonic lsn-paper.tex
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lsn-paper-pdf
          path: paper/lsn-paper.pdf
